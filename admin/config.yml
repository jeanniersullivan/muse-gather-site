backend:
  name: git-gateway
  branch: main

# Where uploaded images are stored / linked from
media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

# Show a "Publishing" workflow (draft → in review → published)
publish_mode: editorial_workflow

site_url: https://museandgather.com
display_url: https://museandgather.com
logo_url: https://museandgather.com/assets/uploads/logo.png

collections:
  - name: essays
    label: Essays
    label_singular: Essay
    folder: "src/essays"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}  —  {{date | date('MMM D, YYYY')}}"
    sortable_fields: [date, title]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Category, name: category, widget: select, options: ["Essay", "Field notes", "Letter"], default: "Essay" }
      - { label: "Publish date", name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
      - { label: "Summary (shown in lists & as the opening line)", name: summary, widget: text, required: false }
      - { label: Topics, name: topics, widget: list, required: false, hint: "Tags shown at the bottom of the essay, e.g. writing, attention" }
      - { label: "Cover image", name: cover, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: events
    label: Events
    label_singular: Event
    folder: "src/events"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}  —  {{eventDate | date('MMM D, YYYY')}}"
    sortable_fields: [eventDate, title]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: "Event date", name: eventDate, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
      - { label: "Time (free text)", name: timeInfo, widget: string, required: false, hint: "e.g. 10am–11:30am PT · 90 minutes" }
      - { label: Location, name: location, widget: string, hint: "e.g. Online, or Hudson, NY" }
      - { label: Format, name: format, widget: select, options: ["Online", "In person", "Hybrid"], required: false }
      - { label: Type, name: badge, widget: select, options: ["Workshop", "Book club", "Retreat", "Reading", "Talk", "Circle"], required: false }
      - { label: Price, name: price, widget: string, required: false, hint: "e.g. $45, Free, or Deposit $250" }
      - { label: "Button label", name: ctaLabel, widget: string, required: false, default: "Reserve" }
      - { label: "Ticket / booking link (Flodesk)", name: ticketUrl, widget: string, required: false, hint: "Paste your Flodesk checkout or signup link" }
      - { label: "Small note", name: note, widget: string, required: false, hint: "e.g. 8 seats left" }
      - { label: "Summary (shown in lists)", name: summary, widget: text, required: false }
      - { label: "Cover image", name: cover, widget: image, required: false }
      - { label: "Details", name: body, widget: markdown, required: false }

  - name: collection
    label: Collection
    label_singular: Collection item
    folder: "src/collection"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}  —  {{access}}"
    sortable_fields: [title, type, order]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Type, name: type, widget: select, options: ["Book", "Guide", "Course", "Download", "Audio", "Other"], default: "Book", hint: "Groups the item on the Collection page (Books, Guides & journals, Courses, Free downloads, Listen, More)" }
      - { label: Access, name: access, widget: select, options: ["For sale", "Free", "Coming soon"], default: "For sale", hint: "For sale = shows a Buy button with the price · Free = shows a Get-it-free button · Coming soon = shows Get notified" }
      - { label: "Price", name: price, widget: string, required: false, hint: "Only for items For sale, e.g. $18 or $120" }
      - { label: "Flodesk checkout / signup link", name: ticketUrl, widget: string, required: false, hint: "PAID: paste your Flodesk checkout link. FREE: paste a Flodesk signup link to collect the email and deliver the download. Leave blank to send people to your newsletter form." }
      - { label: "External buy link (optional)", name: externalUrl, widget: string, required: false, hint: "Use instead of Flodesk if the item is sold somewhere else, e.g. an Amazon or bookshop link" }
      - { label: "Button label", name: ctaLabel, widget: string, required: false, hint: "e.g. Buy the book, Enroll, Get it free, Join the waitlist. Leave blank for a sensible default." }
      - { label: "Badge (short label)", name: badge, widget: string, required: false, hint: "Small tag on the card, e.g. Essay collection, Self-paced, PDF. Defaults to the Type." }
      - { label: "Sort order", name: order, widget: number, required: false, default: 1, value_type: int, hint: "Lower numbers show first within the group" }
      - { label: "Summary (shown on the card)", name: summary, widget: text, required: false }
      - { label: "Cover image", name: cover, widget: image, required: false }
      - { label: "Details", name: body, widget: markdown, required: false, hint: "The longer description shown on the item's own page" }